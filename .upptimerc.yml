owner: repomind-dev
repo: upptime

sites:
  - name: Dashboard (prod)
    url: https://repomind.dev
  - name: API (prod)
    url: https://api.repomind.dev
  - name: Dashboard (qa)
    url: https://qa.repomind.dev
    headers:
      - "x-vercel-protection-bypass: $VERCEL_BYPASS_QA"
  - name: API (qa)
    url: https://api.qa.repomind.dev

status-website:
  cname: status.repomind.dev
  logoUrl: https://raw.githubusercontent.com/repomind-dev/upptime/master/logo.png
  favicon: https://raw.githubusercontent.com/repomind-dev/upptime/master/logo.png
  themeUrl: https://raw.githubusercontent.com/repomind-dev/upptime/master/assets/repomind-theme.css
  name: RepoMind Status
  introTitle: "**Status** dos serviços do RepoMind — atualizado a cada 5 minutos."
  introMessage: Esta página mostra uptime e tempo de resposta em tempo real. Problemas? Abra uma [issue](https://github.com/repomind-dev/upptime/issues) ou siga o histórico.
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/$OWNER/$REPO
  metaTags:
    - name: "color-scheme"
      content: "dark"
    - name: "theme-color"
      content: "#0a0b10"
    - name: "description"
      content: "Status em tempo real dos serviços do RepoMind."
